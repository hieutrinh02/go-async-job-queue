services:
  postgres:
    image: postgres:16-alpine
    container_name: go_async_job_queue_postgres
    environment:
      POSTGRES_USER: jobqueue
      POSTGRES_PASSWORD: jobqueue
      POSTGRES_DB: jobqueue
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobqueue -d jobqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: go_async_job_queue_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  prometheus_data: